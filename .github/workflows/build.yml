name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip \
            libssl-dev libffi-dev python3-dev \
            autoconf automake libtool libltdl-dev \
            libgdbm-dev libnss3-dev libbz2-dev \
            zlib1g-dev libreadline-dev libsqlite3-dev \
            wget curl llvm libncurses5-dev xz-utils tk-dev \
            libxml2-dev libxmlsec1-dev lzma

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Cache Buildozer global directory
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-cache-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "=== Build completed ==="

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: clonemaster--debug
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: build-log
          path: build.log
