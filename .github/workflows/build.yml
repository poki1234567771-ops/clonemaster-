name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Buildozer deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip libssl-dev libffi-dev python3-dev autoconf automake libtool libltdl-dev
          pip install buildozer cython
      - name: Build APK
        run: |
          buildozer init || true
          buildozer android debug 2>&1
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: clonemaster--debug
          path: bin/*.apk
